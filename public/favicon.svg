<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#050a05"/>
  <!-- CRT monitor outline -->
  <rect x="3" y="5" width="26" height="18" rx="2" fill="none" stroke="#ff6eb4" stroke-width="1.5"/>
  <!-- Screen inner glow area -->
  <rect x="5" y="7" width="22" height="14" rx="1" fill="#0a140a"/>
  <!-- Prompt: "> _" -->
  <text x="7" y="18" font-family="monospace" font-size="9" fill="#ff6eb4">_</text>
  <text x="7" y="18" font-family="monospace" font-size="9" fill="#ff6eb4" opacity="0.7">&#x25B6;</text>
  <!-- Stand -->
  <rect x="13" y="23" width="6" height="3" rx="1" fill="#ff6eb4" opacity="0.5"/>
  <rect x="10" y="26" width="12" height="1.5" rx="0.5" fill="#ff6eb4" opacity="0.4"/>
</svg>
